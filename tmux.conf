# /etc/tmux.conf — minimal config for the claude-code-adapter web terminal.
# Used by `tmux -f /etc/tmux.conf new-session -A -s claude claude`; the goal
# is for the terminal to look identical to a plain claude session, with tmux
# only providing session persistence underneath.

# No tmux chrome — invisible to the end user.
set -g status off
set -g default-terminal "xterm-256color"
set -g history-limit 50000

# When clients with different sizes attach, use the largest. Keeps multi-tab
# usable instead of constraining to the smallest viewport.
set -g window-size largest

# Tmux's mouse handling would intercept selection and break the xterm.js
# Shift-drag select + Ctrl-Shift-C copy. Pass mouse events through to claude.
set -g mouse off
