apiVersion: langop.io/v1alpha1
kind: LanguageAgentRuntime
metadata:
  name: claude-code
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
spec:
  # Single combined image used by both the init container (seed-config.mjs)
  # and the main container (server.mjs WebSocket terminal).
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Agents using this runtime sit behind the cluster OIDC proxy (when the cluster enables auth).
  # Claude Code authentication itself is interactive (run /login in the terminal); no credentials here.
  auth:
    enabled: {{ .Values.auth.enabled }}

  ports:
    - name: http
      port: {{ .Values.port }}
      protocol: TCP
      expose: true

  workspace:
    size: {{ .Values.workspace.size }}
    mountPath: {{ .Values.workspace.mountPath }}

  deployment:
    {{- if .Values.image.pullPolicy }}
    imagePullPolicy: {{ .Values.image.pullPolicy }}
    {{- end }}
    initContainers:
      - name: claude-code-adapter
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        {{- if .Values.image.pullPolicy }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- end }}
        # Override the image's default entrypoint (which runs the server)
        # so this init container runs seed-config.mjs once and exits.
        # MODEL_ENDPOINT, LLM_MODEL, and AGENT_NAME are injected by the operator.
        command: ["node", "/app/seed-config.mjs"]
        volumeMounts:
          - name: workspace
            mountPath: {{ .Values.workspace.mountPath }}

    startupProbe:
      tcpSocket:
        port: {{ .Values.port }}
      initialDelaySeconds: 5
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 30

    livenessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3

    readinessProbe:
      tcpSocket:
        port: {{ .Values.port }}
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3

    env:
      - name: CLAUDE_CONFIG_DIR
        value: /workspace/.claude   # Persist credentials, sessions, projects on the PVC

    resources:
      {{- toYaml .Values.resources | nindent 6 }}
